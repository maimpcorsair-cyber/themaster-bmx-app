<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#000000"/>
  
  <!-- Left BMX Rider -->
  <g transform="translate(40, 120)">
    <circle cx="40" cy="50" r="20" fill="white"/>
    <path d="M20,80 L40,140 L60,80" stroke="white" stroke-width="8" fill="none"/>
    <circle cx="20" cy="160" r="25" stroke="white" stroke-width="6" fill="none"/>
    <circle cx="60" cy="160" r="25" stroke="white" stroke-width="6" fill="none"/>
    <path d="M40,140 L40,180" stroke="white" stroke-width="8"/>
  </g>
  
  <!-- Right BMX Rider -->
  <g transform="translate(400, 120) scale(-1, 1)">
    <circle cx="40" cy="50" r="20" fill="white"/>
    <path d="M20,80 L40,140 L60,80" stroke="white" stroke-width="8" fill="none"/>
    <circle cx="20" cy="160" r="25" stroke="white" stroke-width="6" fill="none"/>
    <circle cx="60" cy="160" r="25" stroke="white" stroke-width="6" fill="none"/>
    <path d="M40,140 L40,180" stroke="white" stroke-width="8"/>
  </g>
  
  <!-- THE MASTER text -->
  <text x="256" y="280" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="white" text-anchor="middle">THE MASTER</text>
  
  <!-- Separator line -->
  <rect x="106" y="300" width="300" height="4" rx="2" fill="white"/>
  
  <!-- BMX SCHOOL -->
  <text x="256" y="350" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle">BMX SCHOOL</text>
  
  <!-- Thai text -->
  <text x="256" y="390" font-family="Arial, sans-serif" font-size="20" fill="#aaaaaa" text-anchor="middle">สอนปั่นจักรยานบีเอ็มเอ็กซ์</text>
</svg>