name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install sharp
        run: npm install sharp

      - name: Build web app
        run: npm run build

      - name: Setup Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap sync android

      - name: Generate launcher icons
        run: |
          mkdir -p android/app/src/main/res/mipmap-{mdpi,hdpi,xhdpi,xxhdpi,xxxhdpi}
          node -e "
          const sharp = require('sharp');
          const fs = require('fs');
          const base = './android/app/src/main/res/';
          const svg = '<svg width=\"512\" height=\"512\" xmlns=\"http://www.w3.org/2000/svg\"><rect width=\"512\" height=\"512\" fill=\"#000\"/><text x=\"256\" y=\"200\" font-family=\"Arial\" font-size=\"60\" font-weight=\"bold\" fill=\"white\" text-anchor=\"middle\">THE</text><text x=\"256\" y=\"270\" font-family=\"Arial\" font-size=\"70\" font-weight=\"bold\" fill=\"white\" text-anchor=\"middle\">MASTER</text><rect x=\"100\" y=\"290\" width=\"312\" height=\"6\" fill=\"white\"/><text x=\"256\" y=\"360\" font-family=\"Arial\" font-size=\"40\" font-weight=\"bold\" fill=\"white\" text-anchor=\"middle\">BMX SCHOOL</text><text x=\"256\" y=\"420\" font-family=\"Arial\" font-size=\"24\" fill=\"#888\" text-anchor=\"middle\">สอนปั่นจักรยาน BMX</text></svg>';
          sharp(Buffer.from(svg)).png().toBuffer().then(async buf => {
            const dirs = ['mdpi','hdpi','xhdpi','xxhdpi','xxxhdpi'];
            const sizes = [48,72,96,144,192];
            for (let i=0; i<dirs.length; i++) {
              const d = dirs[i];
              const resized = await sharp(buf).resize(sizes[i],sizes[i]).toBuffer();
              fs.writeFileSync(base+d+'/ic_launcher.png', resized);
              fs.writeFileSync(base+d+'/ic_launcher_round.png', resized);
              fs.writeFileSync(base+d+'/ic_launcher_foreground.png', buf);
            }
            console.log('Icons generated!');
          });
          "

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TheMasterBMX-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Create Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          tag_name: v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}